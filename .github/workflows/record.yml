name: Meet Recorder

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Google Meet URL'
        required: true
        type: string
        placeholder: 'https://meet.google.com/abc-xyz'

jobs:
  record:
    name: 🎥 Record Meeting
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg pulseaudio
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps

      - name: 🎥 Record
        env:
          MEET_URL: ${{ github.event.inputs.meet_url }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          pulseaudio -D --exit-idle-time=-1
          Xvfb :99 -screen 0 1366x768x24 &
          export DISPLAY=:99
          
          python meet_bot.py &
          BOT_PID=$!
          
          sleep 30
          
          ffmpeg -y \
            -f x11grab \
            -video_size 1366x768 \
            -framerate 30 \
            -i :99 \
            -f pulse \
            -i default \
            -c:v libx264 \
            -preset veryfast \
            -crf 20 \
            -pix_fmt yuv420p \
            -c:a aac \
            -b:a 192k \
            -movflags +faststart \
            output.mp4 > /dev/null 2>&1 &
          FFMPEG_PID=$!
          
          while true; do
            if ! kill -0 $BOT_PID 2>/dev/null; then
              kill -SIGINT $FFMPEG_PID 2>/dev/null
              break
            fi
            sleep 10
          done

      - name: 📤 Upload
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f "output.mp4" ]; then
            python -c "
import os, requests
bot_token = os.environ.get('BOT_TOKEN', '')
chat_id = os.environ.get('CHAT_ID', '')
if bot_token and chat_id and os.path.exists('output.mp4'):
    with open('output.mp4', 'rb') as f:
        requests.post(
            f'https://api.telegram.org/bot{bot_token}/sendDocument',
            data={'chat_id': chat_id},
            files={'document': f},
            timeout=300
        )
    print('✅ Upload complete')
"
          fi

      - name: 🧹 Cleanup
        if: always()
        run: |
          rm -rf output.mp4 *.png *.db chrome_profile
          echo "✅ Cleanup done"
