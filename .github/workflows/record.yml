name: Secure Cloud Meet Recorder

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Target Meeting URL'
        required: true

jobs:
  Recording-Engine:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    permissions:
      contents: read
      actions: read

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🛠️ Install Core Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg chromium-browser jq p7zip-full
          pip install gdown
          if [ -f package.json ]; then npm install; fi

      - name: 🗂️ Download & Extract Google Profile Securely
        env:
          DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          echo "⬇️ Downloading profile from secure Drive link..."
          gdown $DRIVE_FILE_ID -O profile.zip
          
          echo "📦 Extracting Profile with 7-Zip..."
          if [ -z "$ZIP_PASSWORD" ]; then
            echo "🔓 No password detected, extracting normally..."
            7z x profile.zip -o/tmp/chrome_profile -y
          else
            echo "🔐 Password detected, extracting securely..."
            7z x profile.zip -p"$ZIP_PASSWORD" -o/tmp/chrome_profile -y
          fi
          echo "✅ Profile Ready!"

      - name: 🎥 Start 720p Optimized Screen & Recording
        env:
          MEET_URL: ${{ github.event.inputs.meet_url }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99
          echo "✅ Virtual Display Started on :99 (720p)"

          node record.js "$MEET_URL" & 
          MEET_PID=$!
          echo "✅ Meeting Script Running (PID: $MEET_PID)"

          ffmpeg -y -f x11grab -video_size 1280x720 -framerate 24 -i :99 \
                 -c:v libx264 -preset ultrafast -crf 26 -pix_fmt yuv420p \
                 output.mp4 > /dev/null 2>&1 &
          FFMPEG_PID=$!
          echo "🎥 Optimized Recording Started safely (PID: $FFMPEG_PID)"

          while true; do
            FLAG=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              https://api.github.com/repos/$REPO_NAME/actions/variables/STOP_FLAG | jq -r .value)

            if [ "$FLAG" == "1" ]; then
              echo "🛑 STOP SIGNAL DETECTED! Stopping smoothly..."
              kill -SIGINT $FFMPEG_PID
              wait $FFMPEG_PID 2>/dev/null
              kill -SIGINT $MEET_PID 2>/dev/null
              break
            fi

            if ! kill -0 $MEET_PID 2>/dev/null; then
              echo "⚠️ Meeting script stopped automatically. Saving video..."
              kill -SIGINT $FFMPEG_PID
              wait $FFMPEG_PID 2>/dev/null
              break
            fi
            sleep 10
          done

      - name: 📤 Upload Backup to GitHub Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Meeting-Recording-Optimized
          path: |
            ./output.mp4
            ./*.png
          retention-days: 5

      - name: 🚀 Telegram VIP Uploader (2GB Limit Unlocked)
        if: always()
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install pyrogram tgcrypto
          
          cat << 'EOF' > upload.py
          import os
          import sys
          from pyrogram import Client

          api_id_str = os.environ.get("API_ID", "")
          api_hash = os.environ.get("API_HASH", "")
          bot_token = os.environ.get("BOT_TOKEN", "")
          chat_id_str = os.environ.get("CHAT_ID", "")

          if not api_id_str or not api_hash or not bot_token or not chat_id_str:
              print("❌ ERROR: Tumhare GitHub Secrets mein kuch missing hai!")
              print(f"API_ID: {bool(api_id_str)}, API_HASH: {bool(api_hash)}, BOT_TOKEN: {bool(bot_token)}, CHAT_ID: {bool(chat_id_str)}")
              sys.exit(1)

          api_id = int(api_id_str)
          chat_id = int(chat_id_str)

          app = Client("cloud_bot", api_id=api_id, api_hash=api_hash, bot_token=bot_token)

          with app:
              print("📤 Sending Screenshots to Telegram...")
              if os.path.exists("1_before_join.png"):
                  app.send_photo(chat_id, photo="1_before_join.png", caption="📸 Before Join")
              if os.path.exists("2_after_join.png"):
                  app.send_photo(chat_id, photo="2_after_join.png", caption="📸 After Join")
              
              print("🎥 Sending HD Video (Bypassing 50MB limit)...")
              if os.path.exists("output.mp4"):
                  app.send_document(chat_id, document="output.mp4", caption="🎥 Tumhari HD Meeting Recording!")
                  print("✅ Video Successfully Uploaded!")
              else:
                  print("⚠️ Video file missing.")
          EOF
          
          python upload.py
