name: Meet Recorder

on:
  workflow_dispatch:
    inputs:
      meet_url:
        description: 'Google Meet URL'
        required: true
        type: string
        placeholder: 'https://meet.google.com/abc-xyz'

jobs:
  record:
    name: 🎥 Record Meeting
    runs-on: ubuntu-latest
    timeout-minutes: 350
    
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            ffmpeg \
            pulseaudio \
            jq \
            scrot \
            xdotool \
            libgbm-dev \
            libasound2 \
            libxshmfence1 \
            libnss3

      - name: 📦 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright requests
          playwright install chromium
          playwright install-deps

      - name: 🎥 Start Recording
        env:
          MEET_URL: ${{ github.event.inputs.meet_url }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # Start audio
          pulseaudio -D --exit-idle-time=-1
          
          # Start display server
          Xvfb :99 -screen 0 1366x768x24 &
          export DISPLAY=:99
          
          # Start Python bot
          python meet_bot.py &
          BOT_PID=$!
          echo "🤖 Bot started (PID: $BOT_PID)"
          
          # Wait for bot to join
          sleep 30
          
          # Start FFmpeg recording
          ffmpeg -y \
            -f x11grab \
            -video_size 1366x768 \
            -framerate 30 \
            -i :99 \
            -f pulse \
            -i default \
            -c:v libx264 \
            -preset veryfast \
            -crf 20 \
            -pix_fmt yuv420p \
            -c:a aac \
            -b:a 192k \
            -movflags +faststart \
            output.mp4 > /dev/null 2>&1 &
          FFMPEG_PID=$!
          echo "🎥 FFmpeg started (PID: $FFMPEG_PID)"
          
          # Monitoring loop - check if bot is alive
          while true; do
            if ! kill -0 $BOT_PID 2>/dev/null; then
              echo "⚠️ Bot stopped! Stopping recording..."
              kill -SIGINT $FFMPEG_PID 2>/dev/null
              break
            fi
            sleep 10
          done
          
          # Wait for FFmpeg to finish
          wait $FFMPEG_PID 2>/dev/null
          echo "✅ Recording finished"

      - name: 📤 Upload to Telegram
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -f "output.mp4" ]; then
            python -c "
        import os
        import requests
        import time
        
        bot_token = os.environ.get('BOT_TOKEN', '')
        chat_id = os.environ.get('CHAT_ID', '')
        
        if not bot_token or not chat_id:
            print('⚠️ No Telegram credentials')
            exit(0)
        
        file_size = os.path.getsize('output.mp4') / (1024 * 1024)
        print(f'📊 File size: {file_size:.1f} MB')
        
        # Send file
        with open('output.mp4', 'rb') as f:
            url = f'https://api.telegram.org/bot{bot_token}/sendDocument'
            response = requests.post(
                url,
                data={'chat_id': chat_id},
                files={'document': f},
                timeout=300
            )
            
        if response.status_code == 200:
            print('✅ Upload complete!')
        else:
            print(f'❌ Upload failed: {response.text}')
        "
          else
            echo "⚠️ No output file found!"
          fi

      - name: 🧹 Cleanup
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "🧹 Cleaning up..."
          rm -rf output.mp4 *.png *.log *.db chrome_profile
          echo "✅ Cleanup complete"
          
          # Self-destruct workflow (optional)
          curl -X DELETE \
            -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/$REPO/actions/runs/$RUN_ID || true
